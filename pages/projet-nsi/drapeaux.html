<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Les drapeaux</title>
    <link rel="stylesheet" href="../../css/projet-web.css"/>
</head>

<body>

<p>
    <a href="index.html">

<svg width="120" height="120" viewBox="0 0 140 140" xmlns="http://www.w3.org/2000/svg">

<defs>
<linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#90caf9"/>
<stop offset="100%" stop-color="#0d47a1"/>
</linearGradient>

<filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
<feDropShadow dx="0" dy="6" stdDeviation="6" flood-opacity="0.25"/>
</filter>
</defs>

<circle cx="70" cy="70" r="45" fill="url(#grad)" filter="url(#shadow)"/>

<circle cx="70" cy="70" r="28" fill="none" stroke="white" stroke-width="3"/>
<ellipse cx="70" cy="70" rx="28" ry="12" fill="none" stroke="white" stroke-width="3"/>
<line x1="42" y1="70" x2="98" y2="70" stroke="white" stroke-width="3"/>

</svg>

</a>
</p>
<header>
    <h1>Les drapeaux du monde</h1>
</header>

<main>

<section>

    <h2>Un dessin pour bien comprendre les commandes.</h2>

    <svg width="300" height="200">
        <rect x="0" y="0" width="250" height="150" fill="orange"/>
        <line x1="20" y1="0" x2="20" y2="100" stroke="red" stroke-width="10"/>
        <circle cx="100" cy="50" r="40" fill="none" stroke="green"/>
        <polyline points="0 200 300 200 300 0" fill="cyan"/>
    </svg>

</section>


<section>

    <h2>Le drapeau français.</h2>

    <svg width="300" height="200">
        <rect x="0" y="0" width="100" height="200" fill="blue"/>
        <rect x="200" y="0" width="100" height="200" fill="red"/>
        <rect x="100" y="0" width="100" height="200" fill="white"/>
    </svg>

</section>


<section>

    <h2>Le drapeau ukrainien.</h2>

    <svg width="300" height="200">
        <rect x="0" y="0" width="300" height="100" fill="blue"/>
        <rect x="0" y="100" width="300" height="100" fill="yellow"/>
    </svg>

</section>


<section>

    <h2>Le drapeau allemand.</h2>

    <svg width="300" height="200">
        <rect x="0" y="0" width="300" height="66" fill="black"/>
        <rect x="0" y="66" width="300" height="66" fill="red"/>
        <rect x="0" y="132" width="300" height="68" fill="yellow"/>
    </svg>

</section>


<section>

    <h2>Le drapeau japonais.</h2>

    <svg width="300" height="200">
        <rect x="0" y="0" width="300" height="200" fill="white"/>
        <circle cx="150" cy="100" r="50" fill="red"/>
    </svg>

</section>


<section>

    <h2>Le drapeau tchèque.</h2>

    <svg width="300" height="200">
        <rect x="0" y="0" width="300" height="100" fill="white"/>
        <rect x="0" y="100" width="300" height="100" fill="red"/>
        <polygon points="0 0 125 100 0 200" fill="blue"/>
    </svg>

</section>

</main>

</html>
